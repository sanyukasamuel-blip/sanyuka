<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Cancel Booking | Salon di Bellezza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans&display=swap" rel="stylesheet" />

  <style>
    body{font-family:'Open Sans',sans-serif;background:#fffaf7;color:#444}
    h1{font-family:'Playfair Display',serif;color:#4b2e2e;margin-top:2rem}
    .btn-primary{background:#7c3e3e;border:none}
    .btn-primary:hover{background:#5e2c2c}
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center">Cancel Your Booking</h1>
    <p class="text-muted text-center mb-4">Enter the booking reference you received in your confirmation email.</p>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <form action="http://localhost:3000/cancel_booking" method="POST" class="shadow p-4 rounded bg-light">
          <div class="mb-3">
            <label for="bookingId" class="form-label">Booking Reference *</label>
            <input type="text" id="bookingId" name="bookingId" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email used for the booking *</label>
            <input type="email" id="email" name="email" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary">Cancel Booking</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
