<!-- booking.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Book Appointment | Salon di Bellezza</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans&display=swap" rel="stylesheet">

  <style>
    body {font-family:'Open Sans',sans-serif;background:#fffaf7;color:#444;}
    h1,h2 {font-family:'Playfair Display',serif;color:#4b2e2e;}
    .navbar {background:#f8e1e1;}
    .navbar-brand {font-weight:700;font-size:1.8rem;color:#7c3e3e;}
    .booking-header {text-align:center;padding:3rem 1rem 1rem;}
    .booking-section {padding:2rem 0;}
    .form-control,.form-select {border-radius:10px;}
    .btn-primary {background:#7c3e3e;border:none;}
    .btn-primary:hover {background:#5e2c2c;}
    footer {background:#7c3e3e;color:#fff;text-align:center;padding:1rem;margin-top:3rem;}
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">Salon di Bellezza</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Book Now</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="booking-header">
    <h1>Book Your Appointment</h1>
    <p class="text-muted">Reserve your time with us – it's quick, easy, and beautiful.</p>
  </div>

  <!-- Form -->
  <div class="container booking-section">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <form id="bookingForm" class="shadow p-4 rounded bg-light">
          <div id="successAlert" class="alert alert-success d-none">Booking successful! 😊</div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Full Name *</label>
              <input type="text" name="fullName" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-control" required>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Phone Number *</label>
              <input type="tel" name="phone" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Select Service *</label>
              <select name="service" class="form-select" required>
                <option value="">Choose…</option>
                <option>Hair Styling</option>
                <option>Makeup</option>
                <option>Manicure &amp; Pedicure</option>
                <option>Facial &amp; Skin Care</option>
                <option>Bridal Package</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Preferred Date *</label>
              <input type="date" name="date" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Preferred Time *</label>
              <input type="time" name="time" class="form-control" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Additional Notes</label>
            <textarea name="notes" rows="3" class="form-control" placeholder="e.g. Any allergies, stylist preference…"></textarea>
          </div>

          <button type="submit" class="btn btn-primary px-4">Confirm Booking</button>
        </form>
      </div>
    </div>
  </div>

  <footer>&copy; 2025 Salon di Bellezza. All rights reserved.</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('bookingForm');
    const alertBox = document.getElementById('successAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(form));

      try {
        const res  = await fetch('/submit_booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const json = await res.json();

        if (json.status === 'success') {
          alertBox.classList.remove('d-none');
          setTimeout(() => location.href = '/thankyou.html', 1500);
        } else {
          window.alert(json.message || 'Booking failed.');
        }
      } catch (err) {
        console.error(err);
        window.alert('Server error – please try again later.');
      }
    });
  </script>
</body>
</html>
